name: Android Kernel Build v2

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: "Kernel Repository URL"
        required: true
        default: "https://android.googlesource.com/kernel/common"
      kernel_branch:
        description: "Kernel Branch"
        required: true
        default: "android14-6.1"
      ksu_variant:
        description: "KernelSU Variant"
        required: true
        type: choice
        options:
          - tiann
          - kowsu
          - next
          - resukisu
      disable_susfs:
        description: "Disable SuSFS"
        required: false
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      enable_susfs: ${{ steps.config.outputs.enable_susfs }}
    steps:
      - name: Set Build Config
        id: config
        run: |
          echo "enable_susfs=${{ github.event.inputs.disable_susfs == 'true' && 'false' || 'true' }}" >> $GITHUB_OUTPUT

      - name: Set Matrix
        id: set-matrix
        run: |
          # Pass the chosen variant into the build matrix
          echo "matrix={\"variant\":[\"${{ github.event.inputs.ksu_variant }}\"]}" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    
    env:
      ENABLE_SUSFS: ${{ needs.setup.outputs.enable_susfs }}
      KSU_VARIANT: ${{ matrix.variant }}

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: Clone Kernel Source
        run: |
          echo "Cloning Kernel..."
          git clone --depth=1 --branch ${{ github.event.inputs.kernel_branch }} ${{ github.event.inputs.kernel_repo }} kernel

      - name: Setup KernelSU Variant
        run: |
          KSU_SETUP_START=$SECONDS
          # Nuke rogue folders to clean up the runner
          cd kernel && rm -rf KernelSU drivers/kernelsu KernelSU-Next
          
          case "${{ matrix.variant }}" in
            "tiann") KSU_REPO="tiann/KernelSU"; KSU_BRANCH="main"; USE_SETUP_SH="true" ;;
            "kowsu") KSU_REPO="KOWX712/KernelSU"; KSU_BRANCH="master"; USE_SETUP_SH="true" ;;
            "resukisu") KSU_REPO="ReSukiSU/ReSukiSU"; KSU_BRANCH="main"; USE_SETUP_SH="true" ;;
            "next") KSU_REPO="KernelSU-Next/KernelSU-Next"; KSU_BRANCH="dev"; USE_SETUP_SH="true" ;;
          esac
          
          git clone --depth=1 --branch=$KSU_BRANCH https://github.com/$KSU_REPO.git KernelSU
          
          # Manually integrate KSU to prevent fork setup scripts from rogue cloning
          if [ "$USE_SETUP_SH" = "true" ]; then
            echo "🔗 Manually symlinking KernelSU..."
            ln -sf ../KernelSU/kernel drivers/kernelsu
          else
            echo "📋 Manually copying KernelSU (No symlink)..."
            cp -r KernelSU/kernel drivers/kernelsu
          fi
          
          # Add KSU to kernel makefiles
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          
          echo "KSU_REPO=$KSU_REPO" >> $GITHUB_ENV 
          echo "KSU_BRANCH=$KSU_BRANCH" >> $GITHUB_ENV
          echo "KSU_SETUP_TIME=$((SECONDS - KSU_SETUP_START))s" >> $GITHUB_ENV

      - name: Setup SuSFS
        if: env.ENABLE_SUSFS == 'true'
        run: |
          echo "Downloading SuSFS..."
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
          
          # 1. Apply core kernel SuSFS patches
          cd kernel
          echo "📋 Applying DEFAULT core SuSFS patch..."
          cp ../susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp ../susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
          
          # 2. Apply KSU specific SuSFS patch
          # Prioritize your workflow repo's custom patch, otherwise fallback to Simonpunk's default
          VARIANT_KSU_PATCH="../.github/patches/${{ matrix.variant }}/10_enable_susfs_for_ksu.patch"
          if [ ! -f "$VARIANT_KSU_PATCH" ]; then
             VARIANT_KSU_PATCH="../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
          fi

          if [ -f "$VARIANT_KSU_PATCH" ]; then
            if [ "${{ matrix.variant }}" != "resukisu" ]; then
              echo "📋 Applying $VARIANT_KSU_PATCH..."
              cd KernelSU
              patch -p1 < "$VARIANT_KSU_PATCH" || true
            else
              echo "⏭️ Skipping KSU patch for ReSukiSU (built-in)"
            fi
          fi

      - name: Build Kernel
        run: |
          cd kernel
          echo "🔨 Starting kernel compilation..."
          
          CLANG=/mnt/Hawai/toolchains/Clang-23.0.0git-20260130/bin
          GCC64=/mnt/Hawai/toolchains/arm-gnu-toolchain-15.2.rel1-x86_64-aarch64-none-linux-gnu/bin
          GCC32=/mnt/Hawai/toolchains/arm-gnu-toolchain-15.2.rel1-x86_64-arm-none-eabi/bin
          
          time make -j$(nproc) \
          O=out \
          ARCH=arm64 \
          LLVM=1 \
          LLVM_IAS=1 \
          CC=${CLANG}/clang \
          LD=${CLANG}/ld.lld \
          AR=${CLANG}/llvm-ar \
          NM=${CLANG}/llvm-nm \
          OBJCOPY=${CLANG}/llvm-objcopy \
          OBJDUMP=${CLANG}/llvm-objdump \
          READELF=${CLANG}/llvm-readelf \
          STRIP=${CLANG}/llvm-strip \
          HOSTCC=${CLANG}/clang \
          HOSTCXX=${CLANG}/clang++ \
          HOSTLD=${CLANG}/ld.lld \
          HOSTAR=${CLANG}/llvm-ar \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=${GCC64}/aarch64-none-linux-gnu- \
          CROSS_COMPILE_COMPAT=${GCC32}/arm-none-eabi- \
          gki_defconfig all

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-${{ matrix.variant }}
          path: |
            kernel/out/arch/arm64/boot/Image
            kernel/out/arch/arm64/boot/Image.lz4
            kernel/out/arch/arm64/boot/Image.gz
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kernel Build - ${{ matrix.variant }} - ${{ github.run_id }}"
          tag_name: "build-${{ matrix.variant }}-${{ github.run_id }}"
          body: |
            **Build Details:**
            * Kernel Variant: `${{ matrix.variant }}`
            * SuSFS Enabled: `${{ env.ENABLE_SUSFS }}`
            * Branch: `${{ github.event.inputs.kernel_branch }}`
          files: |
            kernel/out/arch/arm64/boot/Image
            kernel/out/arch/arm64/boot/Image.lz4
            kernel/out/arch/arm64/boot/Image.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        if: always() # This ensures it sends a message even if the build fails!
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            📦 *Android Kernel Build*
            
            *Variant:* ${{ matrix.variant }}
            *SuSFS Enabled:* ${{ env.ENABLE_SUSFS }}
            *Status:* ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}
            
            [View Run on GitHub](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})